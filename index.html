<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welile School Student Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f3f4f6; /* Light gray background */
        transition: background-color 0.2s, color 0.2s;
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Dark mode CSS overrides for Admin Console and other legacy sections */
      .dark body {
        background-color: #020617; /* slate-950 */
      }
      .dark .bg-white {
        background-color: #0f172a !important; /* slate-900 */
        border-color: #1e293b !important; /* slate-800 */
        color: #f8fafc !important; /* slate-50 */
      }
      .dark .border-gray-50,
      .dark .border-gray-100,
      .dark .border-gray-150,
      .dark .border-gray-200,
      .dark .border-gray-250,
      .dark .divide-gray-100,
      .dark .divide-gray-200 {
        border-color: #1e293b !important;
      }
      .dark .bg-gray-50 {
        background-color: #1e293b !important; /* slate-800 */
      }
      .dark .hover\:bg-gray-50:hover,
      .dark tr.hover\:bg-gray-50:hover {
        background-color: #1e293b !important;
      }
      .dark .text-gray-900,
      .dark .text-gray-800,
      .dark .text-gray-700 {
        color: #f1f5f9 !important; /* slate-100 */
      }
      .dark .text-gray-600,
      .dark .text-gray-500,
      .dark .text-gray-400 {
        color: #94a3b8 !important; /* slate-400 */
      }
      .dark input,
      .dark select,
      .dark textarea {
        background-color: #1e293b !important;
        border-color: #334155 !important;
        color: #f8fafc !important;
      }
      .dark input::placeholder,
      .dark textarea::placeholder {
        color: #64748b !important;
      }
      [contenteditable]:empty:before {
        content: attr(data-placeholder);
        color: #94a3b8;
        cursor: text;
        display: block;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              welile: {
                dark: '#111111',
                gray: '#222222',
                purple: '#8b5cf6', // Primary Accent
                lightPurple: '#ede9fe',
                lime: '#d9f99d', // Secondary Accent for specific buttons
              }
            }
          }
        }
      }
    </script>
    <script>
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>

<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
